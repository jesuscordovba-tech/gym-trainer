<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f0f" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">

  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
                script-src 'self' 'unsafe-inline';
                style-src 'self' 'unsafe-inline';
                 connect-src 'self' https://api.github.com https://generativelanguage.googleapis.com https://api.groq.com https://openrouter.ai https://world.openfoodfacts.org https://wger.de;
                 img-src 'self' data: https://wger.de https://world.openfoodfacts.org;
                 frame-src https://www.youtube.com;
                base-uri 'self';
                form-action 'none';">
  <title>GYM TRAINER — Definición 21y</title>
  <link rel="preconnect" href="https://api.github.com">
  <link rel="preconnect" href="https://generativelanguage.googleapis.com">
  <link rel="preconnect" href="https://api.groq.com">
  <link rel="preconnect" href="https://world.openfoodfacts.org">
  <link rel="preconnect" href="https://wger.de">
  <link rel="preconnect" href="https://i.ytimg.com">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="css/style.css?v=50">
  <style>
    /* Lock screen */
    #lockScreen {
      position: fixed;
      inset: 0;
      background: var(--bg, #0d0d0f);
      background-image: radial-gradient(ellipse 80% 60% at 0% 10%, rgba(255,77,109,0.25) 0%, transparent 60%),
                        radial-gradient(ellipse 60% 50% at 100% 30%, rgba(90,200,250,0.18) 0%, transparent 50%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #lockScreen.hidden { display: none; }

    .lock-box {
      background-color: rgba(22,22,24,0.3);
      background-image: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 25%, transparent 45%);
      backdrop-filter: saturate(1.3) blur(30px);
      -webkit-backdrop-filter: saturate(1.3) blur(30px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius);
      padding: 2rem;
      width: 340px;
      max-width: 90vw;
      text-align: center;
      box-shadow: 0 8px 48px rgba(0,0,0,0.35);
    }

    .lock-box h1 {
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
    }
    .lock-box h1 span { color: var(--primary); }

    .lock-box p {
      color: var(--text-dim);
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
    }

    .lock-input {
      width: 100%;
      background: rgba(13,13,15,0.5);
      background-image: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, transparent 35%);
      backdrop-filter: saturate(1.2) blur(12px);
      -webkit-backdrop-filter: saturate(1.2) blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text);
      padding: 0.75rem;
      border-radius: var(--radius-sm);
      font-size: 1.5rem;
      text-align: center;
      letter-spacing: 0.5rem;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color 0.2s;
      -webkit-text-security: disc;
    }
    .lock-input:focus { border-color: var(--primary); }

    .lock-error {
      color: var(--primary);
      font-size: 0.8rem;
      min-height: 1.2rem;
      margin-bottom: 0.5rem;
    }

    .lock-btn {
      width: 100%;
      background: rgba(255,77,109,0.65);
      background-image: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 35%);
      backdrop-filter: saturate(1.2) blur(16px);
      -webkit-backdrop-filter: saturate(1.2) blur(16px);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      padding: 0.75rem;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lock-btn:hover { background: rgba(255,77,109,0.8); background-image: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 35%); }
    .lock-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .lock-hint {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 1rem;
    }
    .lock-hint button {
      background: none;
      border: none;
      color: var(--primary);
      cursor: pointer;
      font-size: 0.75rem;
      text-decoration: underline;
    }

  </style>
</head>
<body>

  <!-- Lock Screen / Login -->
  <div id="lockScreen">
    <div class="lock-box"></div>
  </div>

  <!-- Header -->
  <header class="app-header">
    <div class="header-inner">
      <div class="logo"><span>GYM</span>TRAINER</div>
      <span class="sync-indicator" id="syncIndicator"><span class="spinner"></span>Guardando...</span>
      <nav class="main-nav" id="mainNav">
        <button data-tab="workoutTab" class="active">Entreno</button>
        <button data-tab="progressTab">Progreso</button>
        <button data-tab="dietTab">Dieta</button>
        <button data-tab="machinesTab">Máquinas</button>
        <button data-tab="photosTab">Fotos</button>
        <button data-tab="measuresTab">Medidas</button>
        <button data-tab="settingsTab">Ajustes</button>
      </nav>
    </div>
  </header>

  <!-- Content -->
  <div class="content">

    <div id="workoutTab" class="tab-content">
      <div id="dayGrid" class="day-grid"></div>
      <div id="workoutContent"></div>
    </div>

    <div id="progressTab" class="tab-content hidden">
      <div id="progressContent"></div>
    </div>

    <div id="dietTab" class="tab-content hidden">
      <div id="dietContent"></div>
    </div>

    <div id="machinesTab" class="tab-content hidden">
      <h2 style="margin-bottom:1.25rem;font-size:1.2rem;">Máquinas del Gym</h2>
      <div id="machinesContent"></div>
    </div>

    <div id="photosTab" class="tab-content hidden">
      <div id="photosContent"></div>
    </div>

    <div id="measuresTab" class="tab-content hidden">
      <div id="measuresContent"></div>
    </div>

    <div id="settingsTab" class="tab-content hidden">
      <div id="settingsContent"></div>
    </div>

  </div>

  <!-- Video overlay -->
  <div class="video-overlay" id="videoOverlay">
    <div class="video-modal">
      <div class="video-modal-header">
        <span class="video-modal-title" id="videoModalTitle">Demostración</span>
        <button class="video-close" id="videoClose">✕</button>
      </div>
      <div class="video-wrapper">
        <iframe id="videoIframe" frameborder="0" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"></iframe>
      </div>
    </div>
  </div>

  <!-- Timer overlay -->
  <div class="timer-overlay" id="timerOverlay">
    <div class="timer-modal">
      <div class="timer-label" id="timerLabel">Descanso</div>
      <div class="timer-display" id="timerDisplay">0:00</div>
      <div class="timer-controls">
        <button class="timer-btn" id="timerStop">Detener</button>
        <button class="timer-btn skip" id="timerSkip">Saltar →</button>
      </div>
    </div>
  </div>

  <!-- Variant overlay (exercise swap) -->
  <div class="variant-overlay" id="variantOverlay">
    <div class="variant-modal">
      <div class="variant-modal-header">
        <span class="variant-modal-title">Cambiar ejercicio</span>
        <button class="variant-close" id="variantClose">✕</button>
      </div>
      <div class="variant-list" id="variantList"></div>
    </div>
  </div>


  <!-- Add custom exercise overlay -->
  <div class="variant-overlay" id="addExOverlay">
    <div class="variant-modal">
      <div class="variant-modal-header">
        <span class="variant-modal-title">Ejercicio personalizado</span>
        <button class="variant-close" id="addExClose">✕</button>
      </div>
      <div id="addExForm">
        <label style="display:block;font-size:0.8rem;color:var(--text-dim);margin-bottom:0.25rem;">Nombre del ejercicio</label>
        <input type="text" id="addExName" class="lock-input" placeholder="Ej: Press con Mancuernas" style="letter-spacing:0;font-size:1rem;-webkit-text-security:none;margin-bottom:0.75rem;">
        <div class="settings-edit-grid">
          <label>Máquina
            <select id="addExMachine" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:0.5rem;border-radius:var(--radius-sm);font-size:0.9rem;"></select>
          </label>
          <label>Series <input type="number" id="addExSets" class="lock-input" value="3" min="1" max="10" style="letter-spacing:0;font-size:1rem;-webkit-text-security:none;"></label>
          <label>Reps <input type="text" id="addExReps" class="lock-input" value="10-12" style="letter-spacing:0;font-size:1rem;-webkit-text-security:none;"></label>
          <label>Descanso (s) <input type="number" id="addExRest" class="lock-input" value="60" min="0" max="300" style="letter-spacing:0;font-size:1rem;-webkit-text-security:none;"></label>
          <label>RIR <input type="number" id="addExRir" class="lock-input" value="1" min="0" max="5" style="letter-spacing:0;font-size:1rem;-webkit-text-security:none;"></label>
          <label>Músculo <input type="text" id="addExMuscle" class="lock-input" value="" placeholder="Ej: Pectoral mayor" style="letter-spacing:0;font-size:1rem;-webkit-text-security:none;"></label>
        </div>
        <label style="display:block;font-size:0.8rem;color:var(--text-dim);margin-bottom:0.25rem;margin-top:0.75rem;">Video (ID de YouTube, opcional)</label>
        <input type="text" id="addExVideo" class="lock-input" placeholder="Ej: SHhVpIi3Fk0" style="letter-spacing:0;font-size:1rem;-webkit-text-security:none;margin-bottom:1rem;">
        <button class="lock-btn" id="addExSave">Agregar ejercicio</button>
      </div>
    </div>
  </div>

  <!-- Coach Chat Overlay -->
  <div class="variant-overlay" id="coachOverlay">
    <div class="variant-modal" style="width:420px;max-width:92vw;height:70vh;display:flex;flex-direction:column;">
      <div class="variant-modal-header">
        <span class="variant-modal-title">Coach IA</span>
        <button class="variant-close" id="coachClose">✕</button>
      </div>
      <div id="coachMessages" style="flex:1;overflow-y:auto;padding:0.5rem 0;font-size:0.85rem;line-height:1.4;white-space:pre-wrap;background:rgba(13,13,15,0.2);border-radius:8px;"></div>
      <div id="coachInputWrap" style="display:flex;gap:0.5rem;margin-top:0.5rem;">
        <input type="text" id="coachInput" placeholder="Pregúntale al coach..." style="flex:1;background:rgba(13,13,15,0.4);background-image:linear-gradient(180deg,rgba(255,255,255,0.04) 0%,transparent 35%);backdrop-filter:saturate(1.2) blur(12px);-webkit-backdrop-filter:saturate(1.2) blur(12px);border:1px solid rgba(255,255,255,0.1);color:var(--text);padding:0.6rem;border-radius:var(--radius-sm);font-size:0.85rem;">
        <button id="coachSend" class="reset-btn" style="padding:0.6rem 1rem;background:rgba(255,77,109,0.15);background-image:linear-gradient(180deg,rgba(255,255,255,0.06) 0%,transparent 35%);backdrop-filter:saturate(1.2) blur(12px);-webkit-backdrop-filter:saturate(1.2) blur(12px);">Enviar</button>
      </div>
    </div>
  </div>

  <!-- Exercise History Overlay -->
  <div class="variant-overlay" id="exHistoryOverlay">
    <div class="variant-modal" style="width:400px;max-width:92vw;">
      <div class="variant-modal-header">
        <span class="variant-modal-title">Historial del ejercicio</span>
        <button class="variant-close" id="exHistoryClose">✕</button>
      </div>
      <div id="exHistoryContent"></div>
    </div>
  </div>

  <!-- Floating coach button -->
  <button id="coachFab" style="position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;width:56px;height:56px;border-radius:50%;background:rgba(255,77,109,0.6);background-image:linear-gradient(180deg,rgba(255,255,255,0.1) 0%,transparent 40%);backdrop-filter:saturate(1.2) blur(16px);-webkit-backdrop-filter:saturate(1.2) blur(16px);color:#fff;border:1px solid rgba(255,255,255,0.1);font-size:1.5rem;cursor:pointer;box-shadow:0 8px 32px rgba(255,77,109,0.3);display:none;transition:all 0.2s;">C</button>

  <script src="js/data.js?v=49"></script>
  <script src="js/auth.js?v=49"></script>
  <script src="js/storage.js?v=49"></script>
  <script src="js/db.js?v=49"></script>
  <script src="js/app.js?v=49"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js?v=50').then(r => {
        if (r.waiting) { r.waiting.postMessage({ type: 'SKIP_WAITING' }) }
      }).catch(() => {})
    }
  </script>
</body>
</html>
