<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f0f" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self';
               style-src 'self' 'unsafe-inline';
               connect-src 'self' https://api.github.com;
               img-src 'self' data:;
               frame-src https://www.youtube.com;
               base-uri 'self';
               form-action 'none';">
  <title>GYM TRAINER — Definición 21y</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Lock screen */
    #lockScreen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #lockScreen.hidden { display: none; }

    .lock-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 340px;
      max-width: 90vw;
      text-align: center;
    }

    .lock-box h1 {
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
    }
    .lock-box h1 span { color: var(--primary); }

    .lock-box p {
      color: var(--text-dim);
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
    }

    .lock-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.75rem;
      border-radius: var(--radius-sm);
      font-size: 1.5rem;
      text-align: center;
      letter-spacing: 0.5rem;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color 0.2s;
      -webkit-text-security: disc;
    }
    .lock-input:focus { border-color: var(--primary); }

    .lock-error {
      color: var(--primary);
      font-size: 0.8rem;
      min-height: 1.2rem;
      margin-bottom: 0.5rem;
    }

    .lock-btn {
      width: 100%;
      background: var(--primary);
      border: none;
      color: white;
      padding: 0.75rem;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .lock-btn:hover { opacity: 0.9; }
    .lock-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .lock-hint {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 1rem;
    }
    .lock-hint button {
      background: none;
      border: none;
      color: var(--primary);
      cursor: pointer;
      font-size: 0.75rem;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- Lock Screen -->
  <div id="lockScreen">
    <div class="lock-box">
      <h1>💪 <span>GYM</span>TRAINER</h1>
      <p id="lockSubtitle">Ingresa tu PIN</p>
      <input type="password" id="lockInput" class="lock-input" maxlength="6" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
      <div class="lock-error" id="lockError"></div>
      <button class="lock-btn" id="lockBtn">Entrar</button>
      <div class="lock-hint" id="lockHint"></div>
    </div>
  </div>

  <!-- Header -->
  <header class="app-header">
    <div class="header-inner">
      <div class="logo">💪 <span>GYM</span>TRAINER</div>
      <nav class="main-nav" id="mainNav">
        <button data-tab="workoutTab" class="active">Entreno</button>
        <button data-tab="progressTab">Progreso</button>
        <button data-tab="dietTab">Dieta</button>
        <button data-tab="machinesTab">Máquinas</button>
        <button data-tab="settingsTab">Ajustes</button>
      </nav>
    </div>
  </header>

  <!-- Content -->
  <div class="content">

    <div id="dayGrid" class="day-grid"></div>

    <div id="workoutTab" class="tab-content">
      <div id="workoutContent"></div>
    </div>

    <div id="progressTab" class="tab-content hidden">
      <div id="progressContent"></div>
    </div>

    <div id="dietTab" class="tab-content hidden">
      <div id="dietContent"></div>
    </div>

    <div id="machinesTab" class="tab-content hidden">
      <h2 style="margin-bottom:1.5rem;">🏋️ Máquinas del Gym</h2>
      <div id="machinesContent"></div>
    </div>

    <div id="settingsTab" class="tab-content hidden">
      <div id="settingsContent"></div>
    </div>

  </div>

  <!-- Video overlay -->
  <div class="video-overlay" id="videoOverlay">
    <div class="video-modal">
      <div class="video-modal-header">
        <span class="video-modal-title" id="videoModalTitle">📺 Demostración</span>
        <button class="video-close" id="videoClose">✕</button>
      </div>
      <div class="video-wrapper">
        <iframe id="videoIframe" frameborder="0" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"></iframe>
      </div>
    </div>
  </div>

  <!-- Timer overlay -->
  <div class="timer-overlay" id="timerOverlay">
    <div class="timer-modal">
      <div class="timer-label" id="timerLabel">Descanso</div>
      <div class="timer-display" id="timerDisplay">0:00</div>
      <div class="timer-controls">
        <button class="timer-btn" id="timerStop">Detener</button>
        <button class="timer-btn skip" id="timerSkip">Saltar →</button>
      </div>
    </div>
  </div>

  <script src="js/data.js?v=5aa4898"></script>
  <script src="js/auth.js?v=5aa4898"></script>
  <script src="js/db.js?v=5aa4898"></script>
  <script src="js/app.js?v=5aa4898"></script>
</body>
</html>
